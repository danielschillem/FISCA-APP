name: E2E Tests — Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Démarrer la stack Docker ──────────────────────────────
      - name: Start services
        run: docker compose up -d --build
        env:
          POSTGRES_PASSWORD: e2e_password
          JWT_SECRET: e2e_secret_for_ci_only
          ALLOWED_ORIGIN: http://localhost:3000

      - name: Wait for backend /api/health
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && echo "Backend ready." && break
            echo "  attempt $i/30..."
            sleep 3
          done

      - name: Wait for frontend (port 3000)
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 && echo "Frontend ready." && break
            sleep 3
          done

      # ── E2E ────────────────────────────────────────────────────
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL || 'ci@fisca.app' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || 'CIpassword1!' }}

      # ── Artefacts ──────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down -v
