name: Publish Docker Images & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-frontend
  # Docker Hub (public, pas besoin de credentials côté runtime)
  DH_BACKEND_IMAGE: schillem7/fisca-backend
  DH_FRONTEND_IMAGE: schillem7/fisca-frontend

jobs:
  # ── Backend Go ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.DH_BACKEND_IMAGE }}:latest
            ${{ env.DH_BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.DH_FRONTEND_IMAGE }}:latest
            ${{ env.DH_FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Deploy preprod to DigitalOcean droplet ───────────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload preprod compose to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_PREPROD_HOST }}
          username: ${{ secrets.DO_PREPROD_USER }}
          key: ${{ secrets.DO_PREPROD_SSH_KEY }}
          source: "infra/digitalocean/docker-compose.preprod.yml"
          target: "/opt/fisca/"
          strip_components: 2

      - name: Pull and restart services on droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_PREPROD_HOST }}
          username: ${{ secrets.DO_PREPROD_USER }}
          key: ${{ secrets.DO_PREPROD_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/fisca
            cd /opt/fisca
            test -f .env || { echo ".env preprod manquant sur le droplet"; exit 1; }
            mv -f docker-compose.preprod.yml docker-compose.yml
            docker compose pull
            docker compose up -d
            docker image prune -f
            curl -fsS http://localhost:8080/api/health
