name: Publish Docker Images & Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-frontend
  # Docker Hub (public, pas besoin de credentials cote Render)
  DH_BACKEND_IMAGE: schillem7/fisca-backend
  DH_FRONTEND_IMAGE: schillem7/fisca-frontend

jobs:
  # ── Backend Go ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.DH_BACKEND_IMAGE }}:latest
            ${{ env.DH_BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.DH_FRONTEND_IMAGE }}:latest
            ${{ env.DH_FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://fisca-backend.onrender.com/api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Patch Render + trigger deploy (toujours, indépendant des builds) ────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    # Pas de needs: tourne même si les builds échouent (images déjà sur Docker Hub)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Patch Render services → Docker Hub + trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          BACKEND_SVC="srv-d7h5qv1f9bms739m9g4g"
          FRONTEND_SVC="srv-d7h5r2vaqgkc739ovevg"
          OWNER="schillem7"

          echo "==> Patching backend -> docker.io/$OWNER/fisca-backend:latest"
          curl -s -X PATCH "https://api.render.com/v1/services/$BACKEND_SVC" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"image\":{\"imagePath\":\"docker.io/$OWNER/fisca-backend:latest\"}}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('backend patch:', str(d.get('id', d.get('message','?')))[:80])"

          echo "==> Patching frontend -> docker.io/$OWNER/fisca-frontend:latest"
          curl -s -X PATCH "https://api.render.com/v1/services/$FRONTEND_SVC" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"image\":{\"imagePath\":\"docker.io/$OWNER/fisca-frontend:latest\"}}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('frontend patch:', str(d.get('id', d.get('message','?')))[:80])"

          echo "==> Triggering backend deploy..."
          curl -s -o /tmp/back.json -w "Backend HTTP: %{http_code}\n" \
            -X POST "https://api.render.com/v1/services/$BACKEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
          cat /tmp/back.json ; echo ""

          echo "==> Triggering frontend deploy..."
          curl -s -o /tmp/front.json -w "Frontend HTTP: %{http_code}\n" \
            -X POST "https://api.render.com/v1/services/$FRONTEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'
          cat /tmp/front.json ; echo ""
