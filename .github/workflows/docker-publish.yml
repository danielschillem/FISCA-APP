name: Publish Docker Images & Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-frontend

jobs:
  # ── Backend Go ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Make backend package public on GHCR
        continue-on-error: true
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/fisca-app-backend" \
            -d '{"visibility":"public"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('backend visibility:', d.get('visibility', d.get('message','?')))"

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://fisca-backend.onrender.com/api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Make frontend package public on GHCR
        continue-on-error: true
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/fisca-app-frontend" \
            -d '{"visibility":"public"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('frontend visibility:', d.get('visibility', d.get('message','?')))"

  # ── Trigger Render deploys (dépend seulement du backend) ───────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Render deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          BACKEND_SVC="srv-d7h5qv1f9bms739m9g4g"
          FRONTEND_SVC="srv-d7h5r2vaqgkc739ovevg"

          echo "Triggering backend deploy..."
          HTTP=$(curl -s -o /tmp/render_back.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$BACKEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          cat /tmp/render_back.json
          echo "Backend deploy HTTP: $HTTP"

          echo "Triggering frontend deploy..."
          HTTP2=$(curl -s -o /tmp/render_front.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$FRONTEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          cat /tmp/render_front.json
          echo "Frontend deploy HTTP: $HTTP2"
