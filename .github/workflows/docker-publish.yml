name: Publish Docker Images & Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-frontend

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=https://fisca-backend.onrender.com/api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -e
          BACKEND_SVC="srv-d7h5qv1f9bms739m9g4g"
          FRONTEND_SVC="srv-d7h5r2vaqgkc739ovevg"

          echo "Triggering backend deploy..."
          curl -sf -X POST "https://api.render.com/v1/services/$BACKEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('backend deploy:', d.get('id','?'), d.get('status','?'))"

          echo "Triggering frontend deploy..."
          curl -sf -X POST "https://api.render.com/v1/services/$FRONTEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('frontend deploy:', d.get('id','?'), d.get('status','?'))"
