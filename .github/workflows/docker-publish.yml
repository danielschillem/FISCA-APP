name: Publish Docker Images & Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-frontend

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=https://fisca-backend.onrender.com/api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Render services to image mode & deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Patch backend service → image pull mode
          curl -s -X PATCH "https://api.render.com/v1/services/srv-d7gvhmbeo5us739lgi7g" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceDetails": {
                "env": "image",
                "imageUrl": "ghcr.io/danielschillem/fisca-backend:latest"
              }
            }' | jq .name,.serviceDetails.env

          # Patch frontend service → image pull mode
          curl -s -X PATCH "https://api.render.com/v1/services/srv-d7gvhqrbc2fs738mnuc0" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceDetails": {
                "env": "image",
                "imageUrl": "ghcr.io/danielschillem/fisca-frontend:latest"
              }
            }' | jq .name,.serviceDetails.env

          # Deploy backend
          curl -s -X POST "https://api.render.com/v1/services/srv-d7gvhmbeo5us739lgi7g/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' | jq .status

          # Deploy frontend
          curl -s -X POST "https://api.render.com/v1/services/srv-d7gvhqrbc2fs738mnuc0/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' | jq .status
