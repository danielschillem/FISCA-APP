name: Publish Docker Images & Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fisca-app-frontend

jobs:
  # ── Backend Go ──────────────────────────────────────────────────────────────
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-backend
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Make backend package public on GHCR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_PUBLIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/fisca-app-backend" \
            -f visibility=public \
            && echo "✅ backend package is now public" \
            || echo "⚠️  Could not set public visibility (needs PAT with write:packages)"

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://fisca-backend.onrender.com/api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=fisca-frontend
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Make frontend package public on GHCR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_PUBLIC_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/fisca-app-frontend" \
            -f visibility=public \
            && echo "✅ frontend package is now public" \
            || echo "⚠️  Could not set public visibility (needs PAT with write:packages)"

  # ── Trigger Render deploys (dépend seulement du backend) ───────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Update Render services to use GHCR image + trigger deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BACKEND_SVC="srv-d7h5qv1f9bms739m9g4g"
          FRONTEND_SVC="srv-d7h5r2vaqgkc739ovevg"
          OWNER="danielschillem"

          # ── Créer un credential GHCR temporaire dans Render ────────────────
          # GITHUB_TOKEN est valide pour la durée du workflow (~60 min)
          # Render pull l'image dans cette fenêtre
          echo "==> Creating GHCR registry credential in Render..."
          CRED_JSON=$(curl -s -X POST "https://api.render.com/v1/registryCredentials" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"ghcr-actions-$(date +%s)\",
              \"registry\": \"GITHUB\",
              \"username\": \"$OWNER\",
              \"authToken\": \"$GHCR_TOKEN\"
            }")
          echo "Credential response: $CRED_JSON"
          CRED_ID=$(echo "$CRED_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          # Render retourne soit {id: ...} soit {credential: {id: ...}}
          print(d.get('id') or d.get('credential', {}).get('id', ''))
          " 2>/dev/null || echo "")
          echo "Credential ID: [$CRED_ID]"

          # ── Mettre à jour les services pour utiliser les images GHCR ───────
          if [ -n "$CRED_ID" ]; then
            echo "==> Updating backend service to pull from GHCR..."
            curl -s -X PATCH "https://api.render.com/v1/services/$BACKEND_SVC" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"image\": {
                  \"imagePath\": \"ghcr.io/$OWNER/fisca-app-backend:latest\",
                  \"registryCredentialId\": \"$CRED_ID\"
                }
              }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('backend patch:', d.get('id', d.get('message','?'))[:60])"

            echo "==> Updating frontend service to pull from GHCR..."
            curl -s -X PATCH "https://api.render.com/v1/services/$FRONTEND_SVC" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"image\": {
                  \"imagePath\": \"ghcr.io/$OWNER/fisca-app-frontend:latest\",
                  \"registryCredentialId\": \"$CRED_ID\"
                }
              }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('frontend patch:', d.get('id', d.get('message','?'))[:60])"
          else
            echo "⚠️  Could not create registry credential - will trigger deploy with existing config"
          fi

          # ── Déclencher les deploys ──────────────────────────────────────────
          echo "==> Triggering backend deploy..."
          HTTP=$(curl -s -o /tmp/back.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$BACKEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          cat /tmp/back.json ; echo "" ; echo "Backend deploy HTTP: $HTTP"

          echo "==> Triggering frontend deploy..."
          HTTP2=$(curl -s -o /tmp/front.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$FRONTEND_SVC/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          cat /tmp/front.json ; echo "" ; echo "Frontend deploy HTTP: $HTTP2"
