name: Frontend CI — Vite + React

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Build, lint & test Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (vulnérabilités critiques)
        run: npm audit --audit-level=critical

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ""
