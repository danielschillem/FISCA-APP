name: Frontend CI/CD — Next.js (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

jobs:
  build:
    name: Build & lint Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}

  deploy:
    name: Deploy to Vercel
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel deploy
        # Vercel se déclenche automatiquement via l'intégration GitHub Bot.
        # Cette étape confirme juste le succès du pipeline CI avant deploy.
        run: echo "CI passé. Vercel déploie automatiquement via GitHub integration."
