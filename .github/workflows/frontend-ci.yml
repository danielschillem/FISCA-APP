name: Frontend CI/CD — Next.js (Render)

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'

jobs:
  build:
    name: Build & lint Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}

  build-docker:
    name: Build Docker image (dry-run)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build dashboard Docker image
        run: docker build -t fisca-dashboard:ci ./dashboard
        env:
          DOCKER_BUILDKIT: 1

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    # Only run E2E when a full backend is available (skip on pure frontend PRs)
    if: vars.RUN_E2E == 'true'
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 14

  deploy:
    name: Deploy to Vercel
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel deploy
        # Vercel se déclenche automatiquement via l'intégration GitHub Bot.
        # Cette étape confirme juste le succès du pipeline CI avant deploy.
        run: echo "CI passé. Vercel déploie automatiquement via GitHub integration."
