name: CI/CD — Pipeline unifié FISCA-APP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Backend Go — tests + lint
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Go tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Tests (race detector + coverage)
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: backend/coverage.out

  # ─────────────────────────────────────────────────────────────
  # 2. Frontend Vite — tsc + vitest + build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Vitest & build Vite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (vulnérabilités critiques)
        run: npm audit --audit-level=critical

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────────────────────
  # 3. E2E Playwright (seulement sur push main)
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright Chromium
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start services (docker compose)
        run: docker compose up -d --build
        env:
          POSTGRES_PASSWORD: e2e_password
          JWT_SECRET: e2e_secret_for_ci_only
          ALLOWED_ORIGIN: http://localhost:3000

      - name: Wait for backend /api/health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/health && echo "Backend ready." && break
            sleep 3
          done

      - name: Wait for frontend (port 3000)
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 && echo "Frontend ready." && break
            sleep 3
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000
          E2E_EMAIL:    ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down -v

  # Déploiement pré-prod/prod déplacé vers workflow dédié:
  # .github/workflows/docker-publish.yml (DigitalOcean).
