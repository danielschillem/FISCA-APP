[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Pointe sur le backend Render — remplacer si l'URL change
  VITE_API_URL = "https://fisca-backend.onrender.com/api"

# SPA : toutes les routes non trouvées → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# En-têtes de sécurité globaux
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "geolocation=(), microphone=(), camera=()"

# Cache long pour les assets Vite (hash dans le nom du fichier)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
