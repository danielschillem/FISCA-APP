version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fisca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: fisca_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fisca" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://neondb_owner:npg_RgjhPUx4ra3u@ep-curly-feather-alu1ikkd-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      PORT: "8080"
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000,http://localhost:5173}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-1jDYA7oooMGxqUOSspxRo1RmCgRjLHkO}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Vite SPA — served via nginx with /api reverse-proxy to backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "" # vide → axios default '/api' → nginx proxie vers backend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
