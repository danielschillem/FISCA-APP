# render.yaml — FISCA Backend + Frontend
# https://render.com/docs/yaml-spec
#
# Base de données : Neon PostgreSQL (gratuit, déjà créé)
#
# ── PROCÉDURE DE DÉPLOIEMENT ──────────────────────────────────────────────────
# 1. Render Dashboard → supprimer les anciens services fisca-backend / fisca-frontend
# 2. New → Blueprint → repo danielschillem/FISCA-APP → branch main
# 3. Render crée fisca-backend + fisca-frontend (URLs prévisibles)
#    https://fisca-backend.onrender.com   — backend Go
#    https://fisca-frontend.onrender.com  — frontend React
# 4. Variables déjà configurées dans ce fichier :
#    DATABASE_URL, ALLOWED_ORIGIN, VITE_API_URL, MISTRAL_API_KEY
# 5. Variables optionnelles à saisir dans Render Dashboard :
#    SUPERADMIN_EMAIL / SUPERADMIN_PASSWORD  (admin initial)
#    OPENAI_API_KEY, SMTP_HOST, SMTP_USER, SMTP_PASS, SMTP_FROM

services:
  # ── Backend Go ────────────────────────────────────────────────────────────
  - type: web
    name: fisca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_RgjhPUx4ra3u@ep-curly-feather-alu1ikkd-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGIN
        value: "https://fisca-frontend.onrender.com,https://localhost,http://localhost,capacitor://localhost"
      - key: ADMIN_SECRET
        generateValue: true
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        value: "1jDYA7oooMGxqUOSspxRo1RmCgRjLHkO"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_URL
        value: "https://fisca-frontend.onrender.com"

  # ── Frontend Vite (nginx) ─────────────────────────────────────────────────
  - type: web
    name: fisca-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        value: "https://fisca-backend.onrender.com/api"

