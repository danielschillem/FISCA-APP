# render.yaml — FISCA Backend + Frontend
# https://render.com/docs/yaml-spec
#
# Base de données : Neon PostgreSQL (gratuit, déjà créé)
#
# ── PROCÉDURE DE DÉPLOIEMENT ──────────────────────────────────────────────────
# 1. Render Dashboard → New → Blueprint → repo danielschillem/FISCA-APP
# 2. Render crée fisca-backend + fisca-frontend
# 3. fisca-backend → Environment → ajouter :
#    DATABASE_URL = <URL Neon PostgreSQL>
#    OPENAI_API_KEY = sk-... (optionnel, pour l'assistant IA)
# 4. fisca-frontend → Settings → Custom Domain (ex: app.fisca.bf)
# 5. fisca-backend → Settings → Deploy Hook URL
#    → GitHub Secrets → RENDER_DEPLOY_HOOK_BACKEND

services:
  # ── Backend Go ────────────────────────────────────────────────────────────
  - type: web
    name: fisca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false        # → coller l'URL Neon manuellement
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGIN
        sync: false        # → ex: https://fisca-frontend.onrender.com
      - key: ADMIN_SECRET
        generateValue: true
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        value: "1jDYA7oooMGxqUOSspxRo1RmCgRjLHkO"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend Vite (nginx) ─────────────────────────────────────────────────
  - type: web
    name: fisca-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: VITE_API_URL
        sync: false        # → coller manuellement : https://fisca-backend.onrender.com/api

