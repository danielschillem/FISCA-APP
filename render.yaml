# render.yaml — FISCA Backend
# https://render.com/docs/yaml-spec
#
# Base de données : Neon PostgreSQL (gratuit, déjà créé)
# Dashboard Next.js : Vercel https://fisca-app.vercel.app
#
# ── PROCÉDURE DE DÉPLOIEMENT ──────────────────────────────────────────────────
# 1. Render Dashboard → New → Blueprint → repo danielschillem/FISCA-APP
# 2. Render crée fisca-backend (service web Docker)
# 3. Après création, aller dans fisca-backend → Environment → ajouter :
#    DATABASE_URL = postgresql://neondb_owner:npg_RgjhPUx4ra3u@ep-curly-feather-alu1ikkd.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require
# 4. Save Changes → le service redémarre et se connecte à Neon
# 5. fisca-backend → Settings → Deploy Hook URL
#    → GitHub Secrets → RENDER_DEPLOY_HOOK_BACKEND

services:
  - type: web
    name: fisca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false        # → coller l'URL Neon manuellement (voir procédure ci-dessus)
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGIN
        value: "https://fisca-app.vercel.app"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
