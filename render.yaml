# render.yaml — FISCA Backend + PostgreSQL
# https://render.com/docs/yaml-spec
#
# Le dashboard Next.js est déployé séparément sur Vercel.
#
# ── Secrets à configurer dans le dashboard Render → fisca-backend → Environment ──
#   ALLOWED_ORIGIN → https://fisca-app.vercel.app  (déjà pré-rempli ci-dessous)
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM → (optionnel)
#
# ── Après déploiement ─────────────────────────────────────────────────────────
#   fisca-backend → Settings → Deploy Hook URL
#   → GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK_BACKEND

services:
  # ─── Backend Go (Docker) ───────────────────────────────────
  - type: web
    name: fisca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: starter          # Plan payant — pas de spin-down après 15 min
    autoDeploy: true
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fisca-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGIN
        value: "https://fisca-app.vercel.app"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

# ─── Base de données PostgreSQL ────────────────────────────
databases:
  - name: fisca-db
    databaseName: fisca
    user: fisca
    region: frankfurt
    plan: starter          # Plan payant — backups automatiques inclus
    ipAllowList: []        # Accès uniquement depuis les services Render internes
