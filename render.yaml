# render.yaml — FISCA Backend
# https://render.com/docs/yaml-spec
#
# La base de données PostgreSQL est gérée SÉPARÉMENT (DB Render existante ou Neon).
#
# ── Secrets à configurer dans le dashboard Render → fisca-backend → Environment ──
#   DATABASE_URL  → Connection string PostgreSQL (voir instructions ci-dessous)
#   ALLOWED_ORIGIN → https://fisca-app.vercel.app
#   SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM → (optionnel)
#
# ── Option A : Utiliser votre DB Render existante ──────────────────────────────
#   Render Dashboard → votre DB existante → Info → "Internal Database URL"
#   Copier cette URL → la coller dans DATABASE_URL de fisca-backend
#
# ── Option B : Créer une DB Neon gratuite (recommandé) ────────────────────────
#   1. neon.tech → New project → copier la "Connection string"
#   2. La coller dans DATABASE_URL de fisca-backend
#
# ── Après déploiement ─────────────────────────────────────────────────────────
#   fisca-backend → Settings → Deploy Hook URL
#   → GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK_BACKEND

services:
  # ─── Backend Go (Docker) ───────────────────────────────────
  - type: web
    name: fisca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false          # ← Définir manuellement (DB existante ou Neon)
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
      - key: ALLOWED_ORIGIN
        value: "https://fisca-app.vercel.app"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
