server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver — Docker DNS interne (docker-compose) + Cloudflare en fallback.
    # Utiliser une variable dans proxy_pass reporte la résolution DNS
    # à l'instant de la requête (et non au démarrage de nginx).
    # Si VITE_API_URL est vide, Axios utilise /api et ce reverse-proxy route vers backend.
    resolver 127.0.0.11 1.1.1.1 valid=30s ipv6=off;

    # Reverse proxy — API calls forwarded to the backend container
    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
