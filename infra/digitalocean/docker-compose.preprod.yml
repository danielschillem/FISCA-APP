services:
  backend:
    image: ghcr.io/danielschillem/fisca-app-backend:latest
    container_name: fisca-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    image: ghcr.io/danielschillem/fisca-app-frontend:latest
    container_name: fisca-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

